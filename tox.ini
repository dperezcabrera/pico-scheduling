[tox]
env_list = cov, py311, py312, py313, py314
isolated_build = true
skip_missing_interpreters = true

[testenv]
deps =
    pytest>=8
    pico-testing>=0.2.0
    pytest-asyncio
    pico-ioc>=2.2.0
    apscheduler>=3.10,<4
commands = pytest {posargs:tests}

[testenv:cov]
deps =
    {[testenv]deps}
    pytest-cov>=5
package = editable
setenv =
    COVERAGE_FILE = {tox_root}/.coverage
commands = pytest --cov=pico_scheduling --cov-report=term-missing tests
